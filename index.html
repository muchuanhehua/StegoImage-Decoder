<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Base64 图片解码 by 木川和华</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 40px 16px;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    .page {
      max-width: 1240px;
      margin: 0 auto;
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    .side-note {
      width: 230px;
      background: #fff;
      border-radius: 12px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      color: #666;
      font-size: 13px;
      line-height: 1.7;
    }

    .side-note-title {
      margin-bottom: 8px;
      color: #222;
      font-size: 15px;
      font-weight: bold;
    }

    .side-note code {
      display: block;
      margin: 6px 0;
      padding: 6px;
      border-radius: 6px;
      background: #f3f4f6;
      color: #333;
      font-family: Consolas, Monaco, monospace;
      font-size: 12px;
      word-break: break-all;
    }

    .container {
      flex: 1;
      min-width: 0;
      background: #fff;
      padding: 32px 24px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.3;
    }

    .author {
      margin: 8px 0 28px;
      color: #666;
      font-size: 15px;
    }

    。repo-link {
      color: #2563eb;
      text-decoration: none;
    }

    .repo-link:hover {
      text-decoration: underline;
    }

    .upload-area {
      display: block;
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      padding: 34px 20px;
      border: 2px dashed #bbb;
      border-radius: 12px;
      background: #fafafa;
      cursor: pointer;
      transition: 0.2s;
    }

    .upload-area:hover,
    .upload-area.dragover {
      border-color: #2563eb;
      background: #eef5ff;
    }

    .upload-main {
      font-size: 18px;
      color: #222;
    }

    .upload-sub {
      margin-top: 8px;
      font-size: 14px;
      color: #777;
    }

    input[type="file"] {
      display: none;
    }

    .message {
      margin: 18px 0;
      min-height: 22px;
      color: #666;
      font-size: 14px;
    }

    .download-row {
      display: none;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin: 0 auto 18px;
      flex-wrap: wrap;
    }

    .name-input {
      width: 220px;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }

    .name-input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .top-download {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      font-size: 15px;
      cursor: pointer;
    }

    .top-download:hover {
      background: #1d4ed8;
    }

    .result-grid {
      display: grid;
      gap: 14px;
      margin-top: 10px;
    }

    .image-card {
      border: 1px solid #e5e5e5;
      border-radius: 10px;
      padding: 8px;
      background: #fff;
    }

    .preview-img {
      width: 100%;
      height: var(--thumb-height, 220px);
      object-fit: contain;
      border-radius: 8px;
      background: #f2f2f2;
      cursor: zoom-in;
    }

    .file-name {
      margin-top: 6px;
      color: #777;
      font-size: 12px;
      word-break: break-all;
    }

    .error-card {
      padding: 12px;
      border: 1px solid #f3b4b4;
      border-radius: 10px;
      background: #fff5f5;
      color: #b91c1c;
      font-size: 13px;
      word-break: break-all;
    }

    .tip {
      margin-top: 22px;
      color: #888;
      font-size: 13px;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 999;
      background: rgba(0, 0, 0, 0.85);
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .modal.show {
      display: flex;
    }

    .modal img {
      max-width: 96vw;
      max-height: 90vh;
      object-fit: contain;
      background: #fff;
      border-radius: 8px;
    }

    .close-btn {
      position: fixed;
      top: 18px;
      right: 24px;
      color: #fff;
      font-size: 36px;
      cursor: pointer;
      user-select: none;
      z-index: 1001;
    }

    .nav-btn {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      width: 48px;
      height: 64px;
      border: none;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.18);
      color: #fff;
      font-size: 46px;
      line-height: 1;
      cursor: pointer;
      user-select: none;
      z-index: 1001;
    }

    .nav-btn:hover {
      background: rgba(255, 255, 255, 0.32);
    }

    .prev-btn {
      left: 28px;
    }

    .next-btn {
      right: 28px;
    }

    .nav-btn.hidden {
      display: none;
    }

    @media (max-width: 900px) {
      .page {
        flex-direction: column;
      }

      .side-note {
        width: 100%;
        order: 2;
      }

      .container {
        width: 100%;
        order: 1;
      }
    }

    @media (max-width: 600px) {
      body {
        padding: 20px 10px;
      }

      .container {
        padding: 26px 14px;
      }

      h1 {
        font-size: 26px;
      }

      .upload-area {
        padding: 28px 14px;
      }

      .name-input {
        width: 100%;
        max-width: 260px;
      }

      .nav-btn {
        width: 40px;
        height: 56px;
        font-size: 38px;
      }

      .prev-btn {
        left: 10px;
      }

      .next-btn {
        right: 10px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <aside class="side-note">
      <div class="side-note-title">命名规则</div>
      不填前缀时默认使用 <b>image</b>。
      <code>前缀_日期_编号.png</code>
      示例：
      <code>image_20260603_001.png</code>
      批量下载 ZIP 示例：
      <code>image_20260603_002-004.zip</code>
      编号在当前页面内连续递增，刷新或离开页面后重置。
      <br /><br />
      支持导入：
      <code>txt / base64 / b64 / zip</code>
      ZIP 内会自动读取 Base64 文本文件。
    </aside>

    <main class="container">
      <h1>Base64 图片解码</h1>

      <div class="author">
        by 木川和华 ·
        <a
          class="repo-link"
          href="https://github.com/muchuanhehua/Base64-decode-tool"
          target="_blank"
        >
          源码仓库
        </a>
      </div>

      <label id="uploadArea" class="upload-area" for="fileInput">
        <div class="upload-main">点击选择文件，或拖入文件</div>
        <div class="upload-sub">支持 txt/base64/b64 文件，也支持 zip 压缩包</div>
      </label>

      <input
        id="fileInput"
        type="file"
        multiple
        accept=".txt,.base64,.b64,.zip,text/plain,application/zip"
      />

      <div id="message" class="message">请选择或拖入文件</div>

      <div id="downloadRow" class="download-row">
        <input
          id="fileNameInput"
          class="name-input"
          type="text"
          placeholder="文件名前缀，默认 image"
        />
        <button id="downloadBtn" class="top-download">下载图片</button>
      </div>

      <div id="resultGrid" class="result-grid"></div>

      <div class="tip">本工具仅在浏览器本地解码，不会上传文件。</div>
    </main>
  </div>

  <div id="modal" class="modal">
    <span id="closeBtn" class="close-btn">&times;</span>

    <button id="prevBtn" class="nav-btn prev-btn">‹</button>
    <img id="modalImage" alt="放大图片" />
    <button id="nextBtn" class="nav-btn next-btn">›</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

  <script>
    const fileInput = document.getElementById("fileInput");
    const uploadArea = document.getElementById("uploadArea");
    const message = document.getElementById("message");
    const resultGrid = document.getElementById("resultGrid");
    const downloadRow = document.getElementById("downloadRow");
    const downloadBtn = document.getElementById("downloadBtn");
    const fileNameInput = document.getElementById("fileNameInput");

    const modal = document.getElementById("modal");
    const modalImage = document.getElementById("modalImage");
    const closeBtn = document.getElementById("closeBtn");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");

    let decodedImages = [];
    let objectUrls = [];
    let currentImageIndex = 0;
    let downloadCounter = 1;

    fileInput.addEventListener("change", function () {
      handleFiles(fileInput.files);
    });

    uploadArea.addEventListener("dragover", function (event) {
      event.preventDefault();
      uploadArea.classList.add("dragover");
    });

    uploadArea.addEventListener("dragleave", function () {
      uploadArea.classList.remove("dragover");
    });

    uploadArea.addEventListener("drop", function (event) {
      event.preventDefault();
      uploadArea.classList.remove("dragover");
      handleFiles(event.dataTransfer.files);
    });

    downloadBtn.addEventListener("click", downloadResult);
    closeBtn.addEventListener("click", closeModal);
    prevBtn.addEventListener("click", showPrevImage);
    nextBtn.addEventListener("click", showNextImage);

    modal.addEventListener("click", function (event) {
      if (event.target === modal) closeModal();
    });

    document.addEventListener("keydown", function (event) {
      if (!modal.classList.contains("show")) return;

      if (event.key === "Escape") {
        closeModal();
      }

      if (event.key === "ArrowLeft") {
        showPrevImage();
      }

      if (event.key === "ArrowRight") {
        showNextImage();
      }
    });

    async function handleFiles(files) {
      resetResults();

      if (!files || files.length === 0) {
        message.textContent = "请选择或拖入文件";
        return;
      }

      const fileArray = Array.from(files);

      let successCount = 0;
      let failCount = 0;

      message.textContent = "正在解码...";

      for (const file of fileArray) {
        try {
          if (isZipFile(file)) {
            const result = await processZipFile(file);

            successCount += result.success;
            failCount += result.fail;
          } else {
            await processBase64TextFile(file.name, async function () {
              return await readFileAsText(file);
            });

            successCount++;
          }
        } catch (error) {
          createErrorCard(file.name);
          failCount++;
          console.error(error);
        }
      }

      updateGridSize(decodedImages.length);

      if (successCount > 0) {
        downloadRow.style.display = "flex";
        downloadBtn.textContent = successCount >= 2 ? "下载压缩包" : "下载图片";
      }

      message.textContent = "成功 " + successCount + " 个，失败 " + failCount + " 个";
    }

    function isZipFile(file) {
      const name = file.name.toLowerCase();

      return (
        name.endsWith(".zip") ||
        file.type === "application/zip" ||
        file.type === "application/x-zip-compressed"
      );
    }

    function isBase64TextFile(fileName) {
      const name = fileName.toLowerCase();

      return (
        name.endsWith(".txt") ||
        name.endsWith(".base64") ||
        name.endsWith(".b64")
      );
    }

    async function processZipFile(zipFile) {
      const zip = await JSZip.loadAsync(zipFile);
      const entries = Object.values(zip.files);

      let success = 0;
      let fail = 0;
      let foundTextFile = false;

      for (const entry of entries) {
        if (entry.dir) {
          continue;
        }

        if (!isBase64TextFile(entry.name)) {
          continue;
        }

        foundTextFile = true;

        const displayName = zipFile.name + " / " + entry.name;

        try {
          await processBase64TextFile(displayName, async function () {
            return await entry.async("text");
          });

          success++;
        } catch (error) {
          createErrorCard(displayName);
          fail++;
          console.error(error);
        }
      }

      if (!foundTextFile) {
        createErrorCard(zipFile.name + "：压缩包内没有找到 txt/base64/b64 文件");
        fail++;
      }

      return {
        success: success,
        fail: fail
      };
    }

    async function processBase64TextFile(displayName, getContent) {
      const content = await getContent();
      const imageInfo = parseBase64Image(content);
      const blob = base64ToBlob(imageInfo.base64, imageInfo.mimeType);
      const url = URL.createObjectURL(blob);

      objectUrls.push(url);

      decodedImages.push({
        originalName: displayName,
        blob: blob,
        url: url
      });

      const imageIndex = decodedImages.length - 1;
      createImageCard(displayName, url, imageIndex);
    }

    function readFileAsText(file) {
      return new Promise(function (resolve, reject) {
        const reader = new FileReader();

        reader.onload = function () {
          resolve(reader.result);
        };

        reader.onerror = function () {
          reject(new Error("读取失败"));
        };

        reader.readAsText(file);
      });
    }

    function parseBase64Image(content) {
      if (!content || !content.trim()) {
        throw new Error("内容为空");
      }

      content = content.trim();

      const match = content.match(/^data:(image\/[a-zA-Z0-9.+-]+);base64,([\s\S]+)$/);

      if (match) {
        return {
          mimeType: match[1],
          base64: match[2].replace(/\s/g, "")
        };
      }

      const cleanBase64 = content.replace(/\s/g, "");

      return {
        mimeType: detectImageMimeType(cleanBase64),
        base64: cleanBase64
      };
    }

    function base64ToBlob(base64, mimeType) {
      const binary = atob(base64);
      const bytes = [];

      for (let i = 0; i < binary.length; i += 1024) {
        const slice = binary.slice(i, i + 1024);
        const numbers = new Array(slice.length);

        for (let j = 0; j < slice.length; j++) {
          numbers[j] = slice.charCodeAt(j);
        }

        bytes.push(new Uint8Array(numbers));
      }

      return new Blob(bytes, { type: mimeType });
    }

    function detectImageMimeType(base64) {
      if (base64.startsWith("/9j/")) return "image/jpeg";
      if (base64.startsWith("iVBORw0KGgo")) return "image/png";
      if (base64.startsWith("R0lGOD")) return "image/gif";
      if (base64.startsWith("UklGR")) return "image/webp";
      if (base64.startsWith("PHN2Zy") || base64.startsWith("PD94bW")) return "image/svg+xml";
      return "image/png";
    }

    function createImageCard(fileName, imageUrl, imageIndex) {
      const card = document.createElement("div");
      card.className = "image-card";

      const img = document.createElement("img");
      img.className = "preview-img";
      img.src = imageUrl;
      img.alt = fileName;
      img.title = "点击放大";

      img.addEventListener("click", function () {
        openModal(imageIndex);
      });

      const name = document.createElement("div");
      name.className = "file-name";
      name.textContent = fileName;

      card.appendChild(img);
      card.appendChild(name);

      resultGrid.appendChild(card);
    }

    function createErrorCard(fileName) {
      const card = document.createElement("div");
      card.className = "error-card";
      card.textContent = "解码失败：" + fileName;
      resultGrid.appendChild(card);
    }

    function updateGridSize(count) {
      let minWidth = 220;
      let height = 220;

      if (count >= 2) {
        minWidth = 180;
        height = 180;
      }

      if (count >= 6) {
        minWidth = 150;
        height = 150;
      }

      if (count >= 12) {
        minWidth = 120;
        height = 120;
      }

      resultGrid.style.gridTemplateColumns =
        "repeat(auto-fill, minmax(" + minWidth + "px, 1fr))";

      document.documentElement.style.setProperty("--thumb-height", height + "px");
    }

    async function downloadResult() {
      if (decodedImages.length === 0) return;

      const prefix = getFilePrefix();
      const date = getCurrentDateText();

      if (decodedImages.length === 1) {
        const fileNumber = formatNumber(downloadCounter);
        const fileName = prefix + "_" + date + "_" + fileNumber + ".png";

        const a = document.createElement("a");
        a.href = decodedImages[0].url;
        a.download = fileName;
        a.click();

        downloadCounter++;
        return;
      }

      const startNumber = downloadCounter;
      const zip = new JSZip();

      decodedImages.forEach(function (image) {
        const fileNumber = formatNumber(downloadCounter);
        const fileName = prefix + "_" + date + "_" + fileNumber + ".png";

        zip.file(fileName, image.blob);
        downloadCounter++;
      });

      const endNumber = downloadCounter - 1;

      const zipName =
        prefix +
        "_" +
        date +
        "_" +
        formatNumber(startNumber) +
        "-" +
        formatNumber(endNumber) +
        ".zip";

      downloadBtn.textContent = "正在打包...";

      const zipBlob = await zip.generateAsync({ type: "blob" });
      const zipUrl = URL.createObjectURL(zipBlob);

      const a = document.createElement("a");
      a.href = zipUrl;
      a.download = zipName;
      a.click();

      setTimeout(function () {
        URL.revokeObjectURL(zipUrl);
      }, 1000);

      downloadBtn.textContent = "下载压缩包";
    }

    function getFilePrefix() {
      let prefix = fileNameInput.value.trim();

      if (!prefix) {
        prefix = "image";
      }

      prefix = prefix.replace(/\.[^/.]+$/, "");
      prefix = prefix.replace(/[\\/:*?"<>|]/g, "_");
      prefix = prefix.replace(/\s+/g, "_");
      prefix = prefix.replace(/_+/g, "_");
      prefix = prefix.replace(/^_+|_+$/g, "");

      return prefix || "image";
    }

    function getCurrentDateText() {
      const now = new Date();

      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, "0");
      const day = String(now.getDate()).padStart(2, "0");

      return "" + year + month + day;
    }

    function formatNumber(number) {
      return String(number).padStart(3, "0");
    }

    function openModal(index) {
      currentImageIndex = index;
      showCurrentImage();
      modal.classList.add("show");
    }

    function showCurrentImage() {
      if (decodedImages.length === 0) return;

      const image = decodedImages[currentImageIndex];
      modalImage.src = image.url;

      updateNavButtons();
    }

    function showPrevImage() {
      if (decodedImages.length <= 1) return;

      currentImageIndex--;

      if (currentImageIndex < 0) {
        currentImageIndex = decodedImages.length - 1;
      }

      showCurrentImage();
    }

    function showNextImage() {
      if (decodedImages.length <= 1) return;

      currentImageIndex++;

      if (currentImageIndex >= decodedImages.length) {
        currentImageIndex = 0;
      }

      showCurrentImage();
    }

    function updateNavButtons() {
      if (decodedImages.length <= 1) {
        prevBtn.classList.add("hidden");
        nextBtn.classList.add("hidden");
      } else {
        prevBtn.classList.remove("hidden");
        nextBtn.classList.remove("hidden");
      }
    }

    function closeModal() {
      modal.classList.remove("show");
      modalImage.removeAttribute("src");
    }

    function resetResults() {
      resultGrid.innerHTML = "";
      decodedImages = [];
      currentImageIndex = 0;
      downloadRow.style.display = "none";

      objectUrls.forEach(function (url) {
        URL.revokeObjectURL(url);
      });

      objectUrls = [];
      message.textContent = "正在处理...";
    }
  </script>
</body>
</html>
