<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Base64 图片解码 by 木川和华</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 32px 16px;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      background: #fff;
      padding: 28px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.4;
    }

    .subtitle {
      margin-top: 6px;
      margin-bottom: 24px;
      color: #666;
      font-size: 14px;
    }

    .upload-area {
      border: 2px dashed #bbb;
      border-radius: 12px;
      padding: 36px 20px;
      background: #fafafa;
      cursor: pointer;
      transition: 0.2s;
    }

    .upload-area:hover {
      border-color: #2563eb;
      background: #f0f6ff;
    }

    .upload-area.dragover {
      border-color: #2563eb;
      background: #eaf2ff;
    }

    .upload-title {
      font-size: 18px;
      margin-bottom: 8px;
    }

    .upload-desc {
      color: #777;
      font-size: 14px;
      line-height: 1.6;
    }

    input[type="file"] {
      display: none;
    }

    .message {
      margin: 18px 0;
      color: #666;
      font-size: 14px;
      min-height: 20px;
    }

    .result-grid {
      display: grid;
      gap: 16px;
      margin-top: 20px;
    }

    .image-card {
      border: 1px solid #ddd;
      border-radius: 10px;
      background: #fff;
      padding: 10px;
      overflow: hidden;
    }

    .download-btn {
      display: inline-block;
      margin-bottom: 10px;
      padding: 8px 12px;
      background: #2563eb;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-size: 14px;
    }

    .download-btn:hover {
      background: #1d4ed8;
    }

    .preview-img {
      width: 100%;
      height: var(--thumb-height, 220px);
      object-fit: contain;
      border-radius: 8px;
      background: #f3f3f3;
      cursor: zoom-in;
      border: 1px solid #eee;
    }

    .file-name {
      margin-top: 8px;
      color: #777;
      font-size: 12px;
      word-break: break-all;
    }

    .error-card {
      border: 1px solid #f3b4b4;
      background: #fff5f5;
      color: #b91c1c;
      border-radius: 10px;
      padding: 14px;
      font-size: 14px;
      text-align: left;
      word-break: break-all;
    }

    .tip {
      margin-top: 24px;
      color: #777;
      font-size: 13px;
      line-height: 1.6;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      inset: 0;
      background: rgba(0, 0, 0, 0.82);
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .modal.show {
      display: flex;
    }

    .modal img {
      max-width: 96vw;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 8px;
      background: #fff;
    }

    .close-btn {
      position: fixed;
      top: 18px;
      right: 22px;
      color: #fff;
      font-size: 34px;
      line-height: 1;
      cursor: pointer;
      user-select: none;
    }

    @media (max-width: 600px) {
      body {
        padding: 16px 10px;
      }

      .container {
        padding: 20px 14px;
      }

      h1 {
        font-size: 23px;
      }

      .upload-area {
        padding: 28px 12px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Base64 图片解码</h1>
    <div class="subtitle">by 木川和华</div>

    <label class="upload-area" id="uploadArea" for="fileInput">
      <div class="upload-title">点击选择文件，或拖拽文件到这里</div>
      <div class="upload-desc">
        支持一次导入多个包含 Base64 图片内容的文件<br />
        支持纯 Base64，也支持 data:image/...;base64,... 格式
      </div>
    </label>

    <input
      id="fileInput"
      type="file"
      multiple
      accept=".txt,.base64,.b64,text/plain"
    />

    <div id="message" class="message">
      请选择或拖入文件
    </div>

    <div id="resultGrid" class="result-grid"></div>

    <div class="tip">
      本工具只在浏览器本地解码文件内容，不会上传到服务器。
    </div>
  </div>

  <div id="modal" class="modal">
    <span id="closeBtn" class="close-btn">&times;</span>
    <img id="modalImage" alt="放大图片" />
  </div>

  <script>
    const fileInput = document.getElementById("fileInput");
    const uploadArea = document.getElementById("uploadArea");
    const message = document.getElementById("message");
    const resultGrid = document.getElementById("resultGrid");

    const modal = document.getElementById("modal");
    const modalImage = document.getElementById("modalImage");
    const closeBtn = document.getElementById("closeBtn");

    let objectUrls = [];

    fileInput.addEventListener("change", function () {
      handleFiles(fileInput.files);
    });

    uploadArea.addEventListener("dragover", function (event) {
      event.preventDefault();
      uploadArea.classList.add("dragover");
    });

    uploadArea.addEventListener("dragleave", function () {
      uploadArea.classList.remove("dragover");
    });

    uploadArea.addEventListener("drop", function (event) {
      event.preventDefault();
      uploadArea.classList.remove("dragover");

      const files = event.dataTransfer.files;
      handleFiles(files);
    });

    closeBtn.addEventListener("click", closeModal);

    modal.addEventListener("click", function (event) {
      if (event.target === modal) {
        closeModal();
      }
    });

    document.addEventListener("keydown", function (event) {
      if (event.key === "Escape") {
        closeModal();
      }
    });

    async function handleFiles(files) {
      resetResults();

      if (!files || files.length === 0) {
        message.textContent = "请选择或拖入文件";
        return;
      }

      const fileArray = Array.from(files);

      updateGridSize(fileArray.length);

      message.textContent = "正在解码 " + fileArray.length + " 个文件...";

      let successCount = 0;
      let failCount = 0;

      for (const file of fileArray) {
        try {
          const content = await readFileAsText(file);
          const imageInfo = parseBase64Image(content);

          const blob = base64ToBlob(imageInfo.base64, imageInfo.mimeType);
          const objectUrl = URL.createObjectURL(blob);
          objectUrls.push(objectUrl);

          const extension = getExtension(imageInfo.mimeType);
          const downloadName = removeFileExtension(file.name) + "." + extension;

          createImageCard({
            fileName: file.name,
            imageUrl: objectUrl,
            downloadName
          });

          successCount++;
        } catch (error) {
          createErrorCard(file.name);
          failCount++;
          console.error(error);
        }
      }

      message.textContent =
        "处理完成：成功 " + successCount + " 个，失败 " + failCount + " 个";
    }

    function readFileAsText(file) {
      return new Promise(function (resolve, reject) {
        const reader = new FileReader();

        reader.onload = function () {
          resolve(reader.result);
        };

        reader.onerror = function () {
          reject(new Error("文件读取失败"));
        };

        reader.readAsText(file);
      });
    }

    function parseBase64Image(content) {
      if (!content || !content.trim()) {
        throw new Error("文件内容为空");
      }

      content = content.trim();

      const dataUrlMatch = content.match(/^data:(image\/[a-zA-Z0-9.+-]+);base64,([\s\S]+)$/);

      if (dataUrlMatch) {
        return {
          mimeType: dataUrlMatch[1],
          base64: dataUrlMatch[2].replace(/\s/g, "")
        };
      }

      return {
        mimeType: detectImageMimeType(content.replace(/\s/g, "")),
        base64: content.replace(/\s/g, "")
      };
    }

    function base64ToBlob(base64, mimeType) {
      const byteCharacters = atob(base64);
      const byteArrays = [];

      const sliceSize = 1024;

      for (let offset = 0; offset < byteCharacters.length; offset += sliceSize) {
        const slice = byteCharacters.slice(offset, offset + sliceSize);
        const byteNumbers = new Array(slice.length);

        for (let i = 0; i < slice.length; i++) {
          byteNumbers[i] = slice.charCodeAt(i);
        }

        byteArrays.push(new Uint8Array(byteNumbers));
      }

      return new Blob(byteArrays, { type: mimeType });
    }

    function detectImageMimeType(base64) {
      if (base64.startsWith("/9j/")) {
        return "image/jpeg";
      }

      if (base64.startsWith("iVBORw0KGgo")) {
        return "image/png";
      }

      if (base64.startsWith("R0lGOD")) {
        return "image/gif";
      }

      if (base64.startsWith("UklGR")) {
        return "image/webp";
      }

      if (base64.startsWith("PHN2Zy") || base64.startsWith("PD94bW")) {
        return "image/svg+xml";
      }

      return "image/png";
    }

    function getExtension(mimeType) {
      const map = {
        "image/jpeg": "jpg",
        "image/png": "png",
        "image/gif": "gif",
        "image/webp": "webp",
        "image/svg+xml": "svg"
      };

      return map[mimeType] || "png";
    }

    function removeFileExtension(fileName) {
      return fileName.replace(/\.[^/.]+$/, "");
    }

    function createImageCard(options) {
      const card = document.createElement("div");
      card.className = "image-card";

      const downloadBtn = document.createElement("a");
      downloadBtn.className = "download-btn";
      downloadBtn.href = options.imageUrl;
      downloadBtn.download = options.downloadName;
      downloadBtn.textContent = "下载图片";

      const img = document.createElement("img");
      img.className = "preview-img";
      img.src = options.imageUrl;
      img.alt = options.fileName;
      img.title = "点击放大查看";

      img.addEventListener("click", function () {
        openModal(options.imageUrl);
      });

      const fileName = document.createElement("div");
      fileName.className = "file-name";
      fileName.textContent = options.fileName;

      card.appendChild(downloadBtn);
      card.appendChild(img);
      card.appendChild(fileName);

      resultGrid.appendChild(card);
    }

    function createErrorCard(fileName) {
      const card = document.createElement("div");
      card.className = "error-card";
      card.textContent = "解码失败：" + fileName + "。请确认文件中包含正确的 Base64 图片内容。";
      resultGrid.appendChild(card);
    }

    function updateGridSize(fileCount) {
      let minWidth = 220;
      let thumbHeight = 220;

      if (fileCount >= 5) {
        minWidth = 180;
        thumbHeight = 180;
      }

      if (fileCount >= 10) {
        minWidth = 150;
        thumbHeight = 150;
      }

      if (fileCount >= 20) {
        minWidth = 120;
        thumbHeight = 120;
      }

      resultGrid.style.gridTemplateColumns =
        "repeat(auto-fill, minmax(" + minWidth + "px, 1fr))";

      document.documentElement.style.setProperty("--thumb-height", thumbHeight + "px");
    }

    function openModal(imageUrl) {
      modalImage.src = imageUrl;
      modal.classList.add("show");
    }

    function closeModal() {
      modal.classList.remove("show");
      modalImage.removeAttribute("src");
    }

    function resetResults() {
      resultGrid.innerHTML = "";

      objectUrls.forEach(function (url) {
        URL.revokeObjectURL(url);
      });

      objectUrls = [];
      message.textContent = "正在处理...";
    }
  </script>
</body>
</html>
