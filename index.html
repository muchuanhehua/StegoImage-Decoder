<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Base64 图片解码 by 木川和华</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 40px 16px;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: #fff;
      padding: 32px 24px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.3;
    }

    .author {
      margin: 8px 0 28px;
      color: #666;
      font-size: 15px;
    }

    .upload-area {
      display: block;
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      padding: 34px 20px;
      border: 2px dashed #bbb;
      border-radius: 12px;
      background: #fafafa;
      cursor: pointer;
      transition: 0.2s;
    }

    .upload-area:hover,
    .upload-area.dragover {
      border-color: #2563eb;
      background: #eef5ff;
    }

    .upload-main {
      font-size: 18px;
      color: #222;
    }

    .upload-sub {
      margin-top: 8px;
      font-size: 14px;
      color: #777;
    }

    input[type="file"] {
      display: none;
    }

    .message {
      margin: 18px 0;
      min-height: 22px;
      color: #666;
      font-size: 14px;
    }

    .top-download {
      display: none;
      margin: 0 auto 18px;
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      font-size: 15px;
      cursor: pointer;
    }

    .top-download:hover {
      background: #1d4ed8;
    }

    .result-grid {
      display: grid;
      gap: 14px;
      margin-top: 10px;
    }

    .image-card {
      border: 1px solid #e5e5e5;
      border-radius: 10px;
      padding: 8px;
      background: #fff;
    }

    .preview-img {
      width: 100%;
      height: var(--thumb-height, 220px);
      object-fit: contain;
      border-radius: 8px;
      background: #f2f2f2;
      cursor: zoom-in;
    }

    .file-name {
      margin-top: 6px;
      color: #777;
      font-size: 12px;
      word-break: break-all;
    }

    .error-card {
      padding: 12px;
      border: 1px solid #f3b4b4;
      border-radius: 10px;
      background: #fff5f5;
      color: #b91c1c;
      font-size: 13px;
      word-break: break-all;
    }

    .tip {
      margin-top: 22px;
      color: #888;
      font-size: 13px;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 999;
      background: rgba(0, 0, 0, 0.85);
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .modal.show {
      display: flex;
    }

    .modal img {
      max-width: 96vw;
      max-height: 90vh;
      object-fit: contain;
      background: #fff;
      border-radius: 8px;
    }

    .close-btn {
      position: fixed;
      top: 18px;
      right: 24px;
      color: #fff;
      font-size: 36px;
      cursor: pointer;
      user-select: none;
    }

    @media (max-width: 600px) {
      body {
        padding: 20px 10px;
      }

      .container {
        padding: 26px 14px;
      }

      h1 {
        font-size: 26px;
      }

      .upload-area {
        padding: 28px 14px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Base64 图片解码</h1>
    <div class="author">by 木川和华</div>

    <label id="uploadArea" class="upload-area" for="fileInput">
      <div class="upload-main">点击选择文件，或拖入文件</div>
      <div class="upload-sub">支持批量导入 Base64 图片文件</div>
    </label>

    <input
      id="fileInput"
      type="file"
      multiple
      accept=".txt,.base64,.b64,text/plain"
    />

    <div id="message" class="message">请选择或拖入文件</div>

    <button id="downloadBtn" class="top-download">下载图片</button>

    <div id="resultGrid" class="result-grid"></div>

    <div class="tip">本工具仅在浏览器本地解码，不会上传文件。</div>
  </div>

  <div id="modal" class="modal">
    <span id="closeBtn" class="close-btn">&times;</span>
    <img id="modalImage" alt="放大图片" />
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

  <script>
    const fileInput = document.getElementById("fileInput");
    const uploadArea = document.getElementById("uploadArea");
    const message = document.getElementById("message");
    const resultGrid = document.getElementById("resultGrid");
    const downloadBtn = document.getElementById("downloadBtn");

    const modal = document.getElementById("modal");
    const modalImage = document.getElementById("modalImage");
    const closeBtn = document.getElementById("closeBtn");

    let decodedImages = [];
    let objectUrls = [];

    fileInput.addEventListener("change", function () {
      handleFiles(fileInput.files);
    });

    uploadArea.addEventListener("dragover", function (event) {
      event.preventDefault();
      uploadArea.classList.add("dragover");
    });

    uploadArea.addEventListener("dragleave", function () {
      uploadArea.classList.remove("dragover");
    });

    uploadArea.addEventListener("drop", function (event) {
      event.preventDefault();
      uploadArea.classList.remove("dragover");
      handleFiles(event.dataTransfer.files);
    });

    downloadBtn.addEventListener("click", downloadResult);

    closeBtn.addEventListener("click", closeModal);

    modal.addEventListener("click", function (event) {
      if (event.target === modal) closeModal();
    });

    document.addEventListener("keydown", function (event) {
      if (event.key === "Escape") closeModal();
    });

    async function handleFiles(files) {
      resetResults();

      if (!files || files.length === 0) {
        message.textContent = "请选择或拖入文件";
        return;
      }

      const fileArray = Array.from(files);

      updateGridSize(fileArray.length);

      let successCount = 0;
      let failCount = 0;

      message.textContent = "正在解码...";

      for (const file of fileArray) {
        try {
          const content = await readFileAsText(file);
          const imageInfo = parseBase64Image(content);
          const blob = base64ToBlob(imageInfo.base64, imageInfo.mimeType);
          const url = URL.createObjectURL(blob);

          objectUrls.push(url);

          const ext = getExtension(imageInfo.mimeType);
          const fileName = removeFileExtension(file.name) + "." + ext;

          decodedImages.push({
            name: fileName,
            blob: blob,
            url: url
          });

          createImageCard(file.name, url);
          successCount++;
        } catch (error) {
          createErrorCard(file.name);
          failCount++;
        }
      }

      if (successCount > 0) {
        downloadBtn.style.display = "inline-block";
        downloadBtn.textContent = successCount >= 2 ? "下载压缩包" : "下载图片";
      }

      message.textContent = "成功 " + successCount + " 个，失败 " + failCount + " 个";
    }

    function readFileAsText(file) {
      return new Promise(function (resolve, reject) {
        const reader = new FileReader();

        reader.onload = function () {
          resolve(reader.result);
        };

        reader.onerror = function () {
          reject(new Error("读取失败"));
        };

        reader.readAsText(file);
      });
    }

    function parseBase64Image(content) {
      if (!content || !content.trim()) {
        throw new Error("内容为空");
      }

      content = content.trim();

      const match = content.match(/^data:(image\/[a-zA-Z0-9.+-]+);base64,([\s\S]+)$/);

      if (match) {
        return {
          mimeType: match[1],
          base64: match[2].replace(/\s/g, "")
        };
      }

      const cleanBase64 = content.replace(/\s/g, "");

      return {
        mimeType: detectImageMimeType(cleanBase64),
        base64: cleanBase64
      };
    }

    function base64ToBlob(base64, mimeType) {
      const binary = atob(base64);
      const bytes = [];

      for (let i = 0; i < binary.length; i += 1024) {
        const slice = binary.slice(i, i + 1024);
        const numbers = new Array(slice.length);

        for (let j = 0; j < slice.length; j++) {
          numbers[j] = slice.charCodeAt(j);
        }

        bytes.push(new Uint8Array(numbers));
      }

      return new Blob(bytes, { type: mimeType });
    }

    function detectImageMimeType(base64) {
      if (base64.startsWith("/9j/")) return "image/jpeg";
      if (base64.startsWith("iVBORw0KGgo")) return "image/png";
      if (base64.startsWith("R0lGOD")) return "image/gif";
      if (base64.startsWith("UklGR")) return "image/webp";
      if (base64.startsWith("PHN2Zy") || base64.startsWith("PD94bW")) return "image/svg+xml";
      return "image/png";
    }

    function getExtension(mimeType) {
      const map = {
        "image/jpeg": "jpg",
        "image/png": "png",
        "image/gif": "gif",
        "image/webp": "webp",
        "image/svg+xml": "svg"
      };

      return map[mimeType] || "png";
    }

    function removeFileExtension(fileName) {
      return fileName.replace(/\.[^/.]+$/, "");
    }

    function createImageCard(fileName, imageUrl) {
      const card = document.createElement("div");
      card.className = "image-card";

      const img = document.createElement("img");
      img.className = "preview-img";
      img.src = imageUrl;
      img.alt = fileName;
      img.title = "点击放大";

      img.addEventListener("click", function () {
        openModal(imageUrl);
      });

      const name = document.createElement("div");
      name.className = "file-name";
      name.textContent = fileName;

      card.appendChild(img);
      card.appendChild(name);

      resultGrid.appendChild(card);
    }

    function createErrorCard(fileName) {
      const card = document.createElement("div");
      card.className = "error-card";
      card.textContent = "解码失败：" + fileName;
      resultGrid.appendChild(card);
    }

    function updateGridSize(count) {
      let minWidth = 220;
      let height = 220;

      if (count >= 2) {
        minWidth = 180;
        height = 180;
      }

      if (count >= 6) {
        minWidth = 150;
        height = 150;
      }

      if (count >= 12) {
        minWidth = 120;
        height = 120;
      }

      resultGrid.style.gridTemplateColumns =
        "repeat(auto-fill, minmax(" + minWidth + "px, 1fr))";

      document.documentElement.style.setProperty("--thumb-height", height + "px");
    }

    async function downloadResult() {
      if (decodedImages.length === 0) return;

      if (decodedImages.length === 1) {
        const image = decodedImages[0];
        const a = document.createElement("a");
        a.href = image.url;
        a.download = image.name;
        a.click();
        return;
      }

      const zip = new JSZip();

      decodedImages.forEach(function (image) {
        zip.file(image.name, image.blob);
      });

      downloadBtn.textContent = "正在打包...";

      const zipBlob = await zip.generateAsync({ type: "blob" });
      const zipUrl = URL.createObjectURL(zipBlob);

      const a = document.createElement("a");
      a.href = zipUrl;
      a.download = "decoded-images.zip";
      a.click();

      URL.revokeObjectURL(zipUrl);

      downloadBtn.textContent = "下载压缩包";
    }

    function openModal(imageUrl) {
      modalImage.src = imageUrl;
      modal.classList.add("show");
    }

    function closeModal() {
      modal.classList.remove("show");
      modalImage.removeAttribute("src");
    }

    function resetResults() {
      resultGrid.innerHTML = "";
      decodedImages = [];
      downloadBtn.style.display = "none";

      objectUrls.forEach(function (url) {
        URL.revokeObjectURL(url);
      });

      objectUrls = [];
      message.textContent = "正在处理...";
    }
  </script>
</body>
</html>
